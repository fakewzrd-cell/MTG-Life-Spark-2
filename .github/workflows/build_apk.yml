name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - '.github/workflows/build_apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Package APK for download
        run: |
          mkdir -p dist
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d+ -f1)
          cp build/app/outputs/flutter-apk/app-release.apk "dist/MGT-Life-Spark-${VERSION}.apk"
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: mgt-life-spark-apk
          path: dist/*.apk
          retention-days: 30
