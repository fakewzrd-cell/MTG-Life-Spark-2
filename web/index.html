<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-Compatible">
  <meta name="description" content="MGT Life Spark — Commander 2.0 multiplayer battlefield companion.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MGT Life Spark">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MGT Life Spark</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #12121a;
      color: #ffffff;
    }
    #app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 28px;
      background: linear-gradient(180deg, #12121a 0%, #2a1f45 100%);
    }
    #app-loading .splash-dice {
      width: 112px;
      height: 112px;
      perspective: 600px;
    }
    #app-loading .splash-dice-inner {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: splash-dice-roll 1.6s linear infinite;
    }
    #app-loading .splash-dice-inner img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 8px 18px rgba(155, 109, 255, 0.35));
    }
    @keyframes splash-dice-roll {
      0% {
        transform: translateY(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(0.94);
      }
      25% {
        transform: translateY(-28px) rotateX(180deg) rotateY(20deg) rotateZ(8deg) scale(1.02);
      }
      50% {
        transform: translateY(0) rotateX(360deg) rotateY(0deg) rotateZ(0deg) scale(0.94);
      }
      75% {
        transform: translateY(-28px) rotateX(540deg) rotateY(-20deg) rotateZ(-8deg) scale(1.02);
      }
      100% {
        transform: translateY(0) rotateX(720deg) rotateY(0deg) rotateZ(0deg) scale(0.94);
      }
    }
    #app-loading p {
      margin: 0;
      font-size: 13px;
      opacity: 0.75;
      text-align: center;
      max-width: 280px;
      line-height: 1.4;
      letter-spacing: 0.02em;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #app-loading .hint {
      margin-top: 4px;
      font-size: 12px;
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <div id="app-loading" aria-live="polite">
    <div class="splash-dice" aria-hidden="true">
      <div class="splash-dice-inner">
        <img src="icons/life_spark_logo.png" alt="" width="112" height="112"/>
      </div>
    </div>
    <p id="app-loading-text">Loading MTG Life Spark…</p>
    <p id="app-loading-hint" class="hint" hidden></p>
  </div>
  <script src="flutter_bootstrap.js" async onerror="window.__flutterLoadFailed && window.__flutterLoadFailed()"></script>
  <script>
    (function () {
      var hint = document.getElementById('app-loading-hint');
      var text = document.getElementById('app-loading-text');
      window.__flutterLoadFailed = function () {
        if (text) text.textContent = 'Could not load the app.';
        if (hint) {
          hint.hidden = false;
          hint.textContent =
            'Use the Mac dev server in release mode (flutter run -d web-server --release).';
        }
      };
      window.addEventListener('flutter-first-frame', function () {
        var el = document.getElementById('app-loading');
        if (el) el.remove();
      });
      setTimeout(function () {
        if (!document.getElementById('app-loading')) return;
        if (hint) {
          hint.hidden = false;
          hint.textContent =
            'Still loading? Hard-refresh (Cmd+Shift+R). If stuck, clear site data for this URL. Use release server, not debug.';
        }
      }, 15000);
      setTimeout(function () {
        var el = document.getElementById('app-loading');
        if (!el) return;
        if (text) {
          text.textContent = 'Load failed or very slow.';
        }
        if (hint) {
          hint.hidden = false;
          hint.textContent =
            'Clear browser site data for this address, then reload. Debug web builds often hang here.';
        }
      }, 35000);
    })();
  </script>
</body>
</html>
