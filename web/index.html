<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-Compatible">
  <meta name="description" content="MGT Life Spark — Commander 2.0 multiplayer battlefield companion.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MGT Life Spark">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MGT Life Spark</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #12121a;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
    }
    #app-loading .splash-mark {
      width: 128px;
      height: 64px;
      animation: splash-breathe 1.8s ease-in-out infinite;
    }
    #app-loading .splash-mark svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    #app-loading .splash-bolt {
      animation: splash-bolt 1.2s ease-in-out infinite;
    }
    #app-loading .splash-line-1 {
      animation: splash-line 1s ease-out infinite;
    }
    #app-loading .splash-line-2 {
      animation: splash-line 1s ease-out 0.12s infinite;
    }
    #app-loading .splash-line-3 {
      animation: splash-line 1s ease-out 0.24s infinite;
    }
    @keyframes splash-breathe {
      0%, 100% { transform: scale(0.94); opacity: 0.72; }
      50% { transform: scale(1.06); opacity: 1; }
    }
    @keyframes splash-bolt {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }
    @keyframes splash-line {
      0% { transform: translateX(-6px); opacity: 0.35; }
      60% { opacity: 1; }
      100% { transform: translateX(8px); opacity: 0.35; }
    }
    #app-loading p {
      margin: 0;
      font-size: 13px;
      opacity: 0.75;
      text-align: center;
      max-width: 280px;
      line-height: 1.4;
      letter-spacing: 0.02em;
    }
    #app-loading .hint {
      margin-top: 12px;
      font-size: 12px;
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <div id="app-loading" aria-live="polite">
    <div class="splash-mark" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 48" fill="none">
        <circle cx="18" cy="24" r="13" stroke="#FFFFFF" stroke-width="2"/>
        <path
          class="splash-bolt"
          d="M14 13 L20 23 L16.5 23 L22 33"
          stroke="#FFFFFF"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <line class="splash-line splash-line-1" x1="40" y1="17" x2="68" y2="17" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
        <line class="splash-line splash-line-2" x1="44" y1="24" x2="84" y2="24" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
        <line class="splash-line splash-line-3" x1="40" y1="31" x2="68" y2="31" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <p id="app-loading-text">Loading MTG Life Spark…</p>
    <p id="app-loading-hint" class="hint" hidden></p>
  </div>
  <script src="flutter_bootstrap.js" async onerror="window.__flutterLoadFailed && window.__flutterLoadFailed()"></script>
  <script>
    (function () {
      var hint = document.getElementById('app-loading-hint');
      var text = document.getElementById('app-loading-text');
      window.__flutterLoadFailed = function () {
        if (text) text.textContent = 'Could not load the app.';
        if (hint) {
          hint.hidden = false;
          hint.textContent =
            'Use the Mac dev server in release mode (flutter run -d web-server --release).';
        }
      };
      window.addEventListener('flutter-first-frame', function () {
        var el = document.getElementById('app-loading');
        if (el) el.remove();
      });
      setTimeout(function () {
        if (!document.getElementById('app-loading')) return;
        if (hint) {
          hint.hidden = false;
          hint.textContent =
            'Still loading? Hard-refresh (Cmd+Shift+R). If stuck, clear site data for this URL. Use release server, not debug.';
        }
      }, 15000);
      setTimeout(function () {
        var el = document.getElementById('app-loading');
        if (!el) return;
        if (text) {
          text.textContent = 'Load failed or very slow.';
        }
        if (hint) {
          hint.hidden = false;
          hint.textContent =
            'Clear browser site data for this address, then reload. Debug web builds often hang here.';
        }
      }, 35000);
    })();
  </script>
</body>
</html>
