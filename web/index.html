<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-Compatible">
  <meta name="description" content="Life Spark — Commander 2.0 multiplayer battlefield companion.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Life Spark">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Life Spark</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000000;
      color: #ffffff;
    }
    #app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 28px;
      background: #000000;
    }
    #app-loading .splash-dice {
      width: 112px;
      height: 112px;
    }
    #app-loading .splash-dice-inner {
      width: 100%;
      height: 100%;
    }
    #app-loading .splash-dice-inner img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
      filter: drop-shadow(0 8px 18px rgba(155, 109, 255, 0.35));
    }
    #app-loading p {
      margin: 0;
      font-size: 13px;
      opacity: 0.75;
      text-align: center;
      max-width: 280px;
      line-height: 1.4;
      letter-spacing: 0.02em;
      font-family: system-ui, -apple-system, sans-serif;
    }
    /* Hide loading copy until bootstrap is actually slow (matches Flutter). */
    #app-loading-text {
      visibility: hidden;
    }
    #app-loading.slow #app-loading-text {
      visibility: visible;
    }
    #app-loading .hint {
      margin-top: 4px;
      font-size: 12px;
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <div id="app-loading" aria-live="polite">
    <div class="splash-dice" aria-hidden="true">
      <div class="splash-dice-inner">
        <img src="icons/life_spark_logo.png" alt="" width="112" height="112"/>
      </div>
    </div>
    <p id="app-loading-text">Loading Life Spark…</p>
    <p id="app-loading-hint" class="hint" hidden></p>
  </div>
  <script src="flutter_bootstrap.js" async onerror="window.__flutterLoadFailed && window.__flutterLoadFailed()"></script>
  <script>
    (function () {
      var hint = document.getElementById('app-loading-hint');
      var text = document.getElementById('app-loading-text');
      window.__flutterLoadFailed = function () {
        if (text) text.textContent = 'Could not load the app.';
        if (hint) {
          hint.hidden = false;
          hint.textContent =
            'Use the Mac dev server in release mode (flutter run -d web-server --release).';
        }
      };
      window.addEventListener('flutter-first-frame', function () {
        var el = document.getElementById('app-loading');
        if (el) el.remove();
      });
      setTimeout(function () {
        var el = document.getElementById('app-loading');
        if (el) el.classList.add('slow');
      }, 1000);
      setTimeout(function () {
        if (!document.getElementById('app-loading')) return;
        if (hint) {
          hint.hidden = false;
          hint.textContent =
            'Still loading? Hard-refresh (Cmd+Shift+R). If stuck, clear site data for this URL. Use release server, not debug.';
        }
      }, 15000);
      setTimeout(function () {
        var el = document.getElementById('app-loading');
        if (!el) return;
        if (text) {
          text.textContent = 'Load failed or very slow.';
        }
        if (hint) {
          hint.hidden = false;
          hint.textContent =
            'Clear browser site data for this address, then reload. Debug web builds often hang here.';
        }
      }, 35000);
    })();
  </script>
</body>
</html>
