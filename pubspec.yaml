name: mgt_life_spark
description: MTG Life Spark — Commander 2.0 multiplayer battlefield companion.
publish_to: none
version: 1.0.10+10

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^17.2.3

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # QR code display
  qr_flutter: ^4.1.0

  # QR code camera scanner
  mobile_scanner: ^7.2.0

  # WebSocket client
  web_socket_channel: ^3.0.1

  # Permissions
  permission_handler: ^12.0.1

  # Commander card images (Scryfall)
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  http: ^1.2.2
  flutter_svg: ^2.0.16

  # Animations
  lottie: ^3.1.3

  # Haptics
  haptic_feedback: ^0.6.4+3

  # Shake detection (mobile)
  sensors_plus: ^6.1.1

  # Screen wake lock
  wakelock_plus: ^1.2.9

  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  package_info_plus: ^10.1.0
  intl: ^0.20.2
  web: ^1.1.1
  meta: ^1.17.0

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation for Hive adapters
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

  # App icon generation (run: flutter pub run flutter_launcher_icons)
  flutter_launcher_icons: ^0.14.1
  # Native launch splash (run: dart run flutter_native_splash:create)
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/placeholders/
    - assets/mana/
    - assets/mana/hybrid/
    - assets/mana/phy/
    - assets/mana/MYB/
    - assets/mana/symbol/mana/

# ── App icon config (flutter_launcher_icons) ──────────────────────────────
# Place a 1024x1024 PNG at assets/images/app_icon.png, then run:
#   flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#131628"
  adaptive_icon_foreground: "assets/images/app_icon_fg.png"

# Branded launch screen (Android/iOS) — matches [BrandedSplash].
# Regenerate after updating assets/images/splash_logo.png:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#131628"
  image: assets/images/splash_logo.png
  android_12:
    color: "#131628"
    image: assets/images/splash_logo.png
  ios: true
  web: false
